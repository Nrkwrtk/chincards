<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>ChinCards</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ChinCards">
  
  <!-- Новая иконка: две плитки маджонга 中 + 国 -->
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23ff9f4a'/%3E%3Crect x='12' y='20' width='32' height='32' rx='6' fill='white'/%3E%3Ctext x='28' y='44' font-size='22' text-anchor='middle' fill='%23ff6b2c' font-weight='bold'%3E中%3C/text%3E%3Crect x='56' y='20' width='32' height='32' rx='6' fill='white'/%3E%3Ctext x='72' y='44' font-size='22' text-anchor='middle' fill='%23ff6b2c' font-weight='bold'%3E国%3C/text%3E%3C/svg%3E">
  
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23ff9f4a'/%3E%3Crect x='12' y='20' width='32' height='32' rx='6' fill='white'/%3E%3Ctext x='28' y='44' font-size='22' text-anchor='middle' fill='%23ff6b2c' font-weight='bold'%3E中%3C/text%3E%3Crect x='56' y='20' width='32' height='32' rx='6' fill='white'/%3E%3Ctext x='72' y='44' font-size='22' text-anchor='middle' fill='%23ff6b2c' font-weight='bold'%3E国%3C/text%3E%3C/svg%3E">
  
  <link rel="shortcut icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23ff9f4a'/%3E%3Crect x='12' y='20' width='32' height='32' rx='6' fill='white'/%3E%3Ctext x='28' y='44' font-size='22' text-anchor='middle' fill='%23ff6b2c' font-weight='bold'%3E中%3C/text%3E%3Crect x='56' y='20' width='32' height='32' rx='6' fill='white'/%3E%3Ctext x='72' y='44' font-size='22' text-anchor='middle' fill='%23ff6b2c' font-weight='bold'%3E国%3C/text%3E%3C/svg%3E">
</head>
<body ontouchstart="">
  <div class="app">
    <div class="header">
      <div class="level-row">
        <span class="level-label">HSK</span>
        <div class="level-switch">
          <button data-level="1" class="level-btn active">1</button>
          <button data-level="2" class="level-btn">2</button>
          <button data-level="3" class="level-btn">3</button>
          <button data-level="4" class="level-btn">4</button>
          <button data-level="5" class="level-btn">5</button>
          <button data-level="6" class="level-btn">6</button>
          <button data-level="phrase" class="level-btn phrase-mode-btn">F</button>
        </div>
      </div>
      <div class="stats-container">
        <div class="stat-card">
          <span class="stat-value" id="cardsLeft">0</span>
          <span class="stat-label">осталось</span>
        </div>
        <div class="stat-card">
          <span class="stat-value" id="totalLearned">0</span>
          <span class="stat-label">уже знаю</span>
        </div>
      </div>
    </div>

    <div class="card-container">
      <div class="card" id="flashcard">
        <div class="card-front">
          <div class="chinese-char" id="chineseChar"></div>
        </div>
        <div class="card-back">
          <div class="pinyin" id="pinyin"></div>
          <div class="meaning" id="meaning"></div>
          <div class="breakdown" id="breakdown"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
