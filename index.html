<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ChinCards</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ChinCards">
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23ff9f4a'/%3E%3Ctext x='50' y='67' font-size='50' text-anchor='middle' fill='white'%3E🀆%3C/text%3E%3C/svg%3E">
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="level-switch">
        <button data-level="1" class="level-btn active">HSK 1</button>
        <button data-level="2" class="level-btn">HSK 2</button>
        <button data-level="3" class="level-btn">HSK 3</button>
        <button data-level="4" class="level-btn">HSK 4</button>
        <button data-level="5" class="level-btn">HSK 5</button>
        <button data-level="6" class="level-btn">HSK 6</button>
      </div>
      <div class="stats">
        <span id="cardsLeft">0</span> осталось
      </div>
    </div>

    <div class="card-container">
      <div class="card" id="flashcard">
        <div class="card-front">
          <div class="chinese-char" id="chineseChar"></div>
        </div>
        <div class="card-back">
          <div class="pinyin" id="pinyin"></div>
          <div class="meaning" id="meaning"></div>
          <div class="extra-meanings" id="extraMeanings"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
